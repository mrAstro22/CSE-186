#
# CSE186 Assignment 8 Backend
#

openapi: '3.0.3'

info:
  description: CSE186 Assignment 8 Backend
  version: 4.1.0
  title: CSE186 Assignment 8 Backend

servers:
  - url: http://localhost:3010/api/v0

paths:
  /login:
    post:
      summary: Grab Login Info and Verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Credentials'
              
      responses:
        200:
          description: Login Succesful, Return JWT
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Invalid Credentials
          content:
            application/json:
              schema:
                type: object
                required:
                  - error
                properties:
                  error:
                    type: string

  /post:
      get:
        summary: Grab All Posts Authenticated User is allowed to see
        security:
          - bearerAuth: []
        responses:
          200:
            description: Authenticated, Show Posts
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: '#/components/schemas/Post'
          401:
            description: Unauthorized Access
                
  # /group/{id}/post:
  #   get:
  #     summary: Grab All Posts from Group ID

components:
  securitySchemes:
      bearerAuth:
        type: http
        scheme: bearer
        bearerFormat: JWT

  schemas:
    Credentials:
      type: object
      properties:
        email:
          type: string
          example: "molly@books.com"
        password:
          type: string
          format: password
          example: "mollymember"
      required:
        - email
        - password

    User:
      type: object
      required:
        - user
        - accessToken
      properties:
        user:
          type: object
          required:
            - id
            - email
          properties:
            id:
              type: string
            name:
              type: string
            email:
              type: string
        accessToken:
          type: string

    Post:
      description: Singular Post
      type: object
      required:
        - postID
        - userID
        - username
        - email
        - content
        - date
      properties:
        postID:
          type: string
          format: uuid
        userID:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
          format: email
        content:
          type: string
        date:
          type: string
          format: date-time
      example:
          postID: "3f4c6e4b-7a65-4a1e-8d2c-5f6dce9f2a2a"
          userID: "3f4c6e4b-7a65-4a1e-8d2c-5f6dce9f2f2f"
          username: "Aye Astro"
          email: "ayeastro@gmail.com"
          content: "Hello world!"
          date: "2026-03-04T20:15:12.123Z"

