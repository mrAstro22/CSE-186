#
# CSE186 Assignment 7 Backend
#

openapi: '3.0.3'

info:
  description: CSE186 Assignment 7 Backend
  version: 0.2.0
  title: CSE186 Assignment 7 Backend

servers:
  - url: http://localhost:3010/api/v0

paths:
  /mail:
    get: # Should have content property removed
      summary: Return all Mail, Content Removed
      parameters:
        - name: mailbox
          in: query
          required: false
          schema:
            type: string
            example: "inbox"
      responses:
        200:
          description: List of Mail
          content:
            application/json:
              schema: # Reuse Email Schema
                type: array
                items:
                  $ref: '#/components/schemas/Mailbox'
        404:
          description: Not Found
 
  # WIP
  /mail/{id}:
    get: # Include Content Property
      summary: Returns email identified by ID
      parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          example: "8d3e2912-9b8d-49cc-8b4e-772c07fb3c52"
      responses:
        200:
          description: Email by ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmailandContent'
        404:
          description: Not Found
    put:
      summary: Move Email into Named Mailbox
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
            example: "8d3e2912-9b8d-49cc-8b4e-772c07fb3c52"    
        - name: mailbox
          in: query
          required: true
          schema:
            type: string
            example: "inbox"
      responses:
        204:
          description: Email Successfully moved
        404:
          description: Email not found